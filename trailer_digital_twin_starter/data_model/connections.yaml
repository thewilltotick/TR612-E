connections:
  - from: BAT_48V_A
    to: BUS_48V_MAIN
    via:
      - FUSE_CLASS_T_MAIN
      - SW_48V_MAIN
    connection_type: power
    notes: Battery A positive feed to main 48V bus

  - from: BAT_48V_B
    to: BUS_48V_MAIN
    via:
      - FUSE_CLASS_T_MAIN
      - SW_48V_MAIN
    connection_type: power
    notes: Battery B positive feed to main 48V bus

  - from: BAT_48V_A
    to: SHUNT_48V_MAIN
    connection_type: power_return

  - from: BAT_48V_B
    to: SHUNT_48V_MAIN
    connection_type: power_return

  - from: SHUNT_48V_MAIN
    to: BUS_48V_NEG
    connection_type: power_return

  - from: BUS_48V_MAIN
    to: INV_48V_AIO
    connection_type: power

  - from: BUS_48V_NEG
    to: INV_48V_AIO
    connection_type: power_return

  - from: PV_ARRAY_2S2P
    to: SPD_PV_IN
    connection_type: power

  - from: SPD_PV_IN
    to: BRK_PV_INPUT
    connection_type: power

  - from: BRK_PV_INPUT
    to: INV_48V_AIO
    connection_type: power
    notes: PV input to AIO MPPT input

  - from: SHORE_AC_IN
    to: SPD_AC_IN
    connection_type: ac_power

  - from: SPD_AC_IN
    to: BRK_AC_IN
    connection_type: ac_power

  - from: BRK_AC_IN
    to: INV_48V_AIO
    connection_type: ac_power
    notes: Shore power into AIO AC input

  - from: INV_48V_AIO
    to: SPD_AC_OUT
    connection_type: ac_power

  - from: SPD_AC_OUT
    to: PANEL_AC_OUT
    connection_type: ac_power

  - from: PANEL_AC_OUT
    to: BRANCH_AC_GENERAL
    connection_type: ac_branch

  - from: BUS_48V_MAIN
    to: DCDC_48V_TO_12V_MAIN
    connection_type: power

  - from: BUS_48V_NEG
    to: DCDC_48V_TO_12V_MAIN
    connection_type: power_return

  - from: DCDC_48V_TO_12V_MAIN
    to: BRK_12V_MAIN
    connection_type: power

  - from: BRK_12V_MAIN
    to: BUS_12V_DIRTY
    connection_type: power

  - from: BRK_12V_MAIN
    to: BUS_12V_CLEAN
    connection_type: power

  - from: DCDC_48V_TO_12V_MAIN
    to: BUS_12V_NEG
    connection_type: power_return

  - from: BUS_12V_CLEAN
    to: UPS_12V_CRITICAL
    connection_type: power

  - from: UPS_12V_CRITICAL
    to: DCDC_12V_TO_5V_CRITICAL
    connection_type: power

  - from: DCDC_12V_TO_5V_CRITICAL
    to: UPS_5V_PI
    connection_type: power

  - from: UPS_5V_PI
    to: BUS_5V_CRITICAL
    connection_type: power

  - from: BUS_5V_CRITICAL
    to: RPI5_MAIN
    connection_type: power

  - from: BUS_5V_CRITICAL
    to: RELAY_5V_IO
    connection_type: power

  - from: BUS_12V_CLEAN
    to: SW_POE_MAIN
    connection_type: power

  - from: SW_POE_MAIN
    to: STARLINK_MINI
    connection_type: data_power

  - from: SW_POE_MAIN
    to: CAM_POE_01
    connection_type: data_power

  - from: SW_POE_MAIN
    to: CAM_POE_02
    connection_type: data_power

  - from: SW_POE_MAIN
    to: CAM_POE_03
    connection_type: data_power

  - from: SW_POE_MAIN
    to: CAM_POE_04
    connection_type: data_power

  - from: RS232_BAT_A
    to: RPI5_MAIN
    connection_type: telemetry
    notes: Via USB-RS232 adapter

  - from: RS232_BAT_B
    to: RPI5_MAIN
    connection_type: telemetry
    notes: Via USB-RS232 adapter

  - from: RS485_INV_AIO
    to: RPI5_MAIN
    connection_type: telemetry
    notes: Via USB-RS485 adapter

  - from: TEMP_RACK
    to: RPI5_MAIN
    connection_type: telemetry

  - from: TEMP_TRAILER_INSIDE
    to: RPI5_MAIN
    connection_type: telemetry

  - from: TEMP_TRAILER_OUTSIDE
    to: RPI5_MAIN
    connection_type: telemetry

  - from: SHUNT_DC_LOAD_01
    to: RPI5_MAIN
    connection_type: telemetry

  - from: SHUNT_DC_LOAD_02
    to: RPI5_MAIN
    connection_type: telemetry

  - from: SHUNT_DC_LOAD_03
    to: RPI5_MAIN
    connection_type: telemetry
