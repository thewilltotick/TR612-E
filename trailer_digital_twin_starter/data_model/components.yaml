components:
  - id: BAT_48V_A
    type: battery
    subtype: lifepo4_server_rack
    role: primary_storage
    nominal_voltage_v: 51.2
    capacity_ah: 100
    location: rack_bottom_left
    notes: First 48V server-rack battery

  - id: BAT_48V_B
    type: battery
    subtype: lifepo4_server_rack
    role: primary_storage
    nominal_voltage_v: 51.2
    capacity_ah: 100
    location: rack_bottom_right
    notes: Second 48V server-rack battery

  - id: BUS_48V_MAIN
    type: busbar
    subtype: dc_positive_distribution
