  - id: FUSE_CLASS_T_MAIN
    type: fuse
    subtype: class_t
    rating_a: 250
    nominal_voltage_v: 58
    location: breaker_layer
    notes: Placeholder main battery fuse value; verify later

  - id: SW_48V_MAIN
    type: disconnect_switch
    subtype: battery_disconnect
    nominal_voltage_v: 48
    location: breaker_layer

  - id: INV_48V_AIO
