sensors:
- id: SHUNT_48V_MAIN_SENSOR
  component_id: SHUNT_48V_MAIN
  interface: victron_usb
  measures:
  - pack_voltage
  - pack_current
- id: TEMP_RACK_SENSOR
  component_id: TEMP_RACK
  interface: gpio_1wire
  measures:
  - temperature_c
- id: TEMP_TRAILER_INSIDE_SENSOR
  component_id: TEMP_TRAILER_INSIDE
  interface: gpio_1wire
  measures:
  - temperature_c
- id: TEMP_TRAILER_OUTSIDE_SENSOR
  component_id: TEMP_TRAILER_OUTSIDE
  interface: gpio_1wire
  measures:
  - temperature_c
- id: BAT_A_RS232_SENSOR
  component_id: RS232_BAT_A
  interface: usb_rs232
  measures:
  - battery_soc
  - battery_voltage
  - battery_current
- id: BAT_B_RS232_SENSOR
  component_id: RS232_BAT_B
  interface: usb_rs232
  measures:
  - battery_soc
  - battery_voltage
  - battery_current
- id: INV_RS485_SENSOR
  component_id: RS485_INV_AIO
  interface: usb_rs485
  measures:
  - fault_code
  - ac_output_power
  - pv_input_power
